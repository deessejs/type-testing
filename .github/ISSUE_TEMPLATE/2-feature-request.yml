name: ✨ Feature request
description: Suggest a new type utility, matcher, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve, not only the solution you have in mind.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested yet.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Target area
      description: Where would this feature live?
      options:
        - "types (new type utility)"
        - "api (check / assert / expect)"
        - "runtime (type guards)"
        - "vitest (matchers / setup)"
        - "web (landing site)"
        - "docs"
        - "other / not sure"
      default: 0
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do that is hard or impossible today?
      placeholder: "I want to assert that a type is a discriminated union, but there's no utility for it."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The API or behavior you'd like. A usage snippet helps — it will be rendered as TypeScript.
      render: ts
      placeholder: |
        check<Shape>().isDiscriminatedUnion<'kind'>()
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds, or similar features in other libraries (tsd, expect-type, type-fest).
    validations:
      required: false
